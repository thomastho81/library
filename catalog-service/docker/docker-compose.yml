# Docker Compose - Catalog Service (ambiente local / desenvolvimento)
# MongoDB + RabbitMQ (com interface web de gerenciamento).
# Uso: a partir da pasta docker/ execute: docker compose up -d

services:
  mongodb:
    image: mongo:7.0
    container_name: catalog-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: catalog_user
      MONGO_INITDB_ROOT_PASSWORD: catalog_secret
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh 'mongodb://catalog_user:catalog_secret@localhost:27017/admin' --eval 'db.adminCommand(\"ping\")' --quiet || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: catalog-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: catalog_user
      RABBITMQ_DEFAULT_PASS: catalog_secret
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  mongodb_data:
    name: catalog_mongodb_data
