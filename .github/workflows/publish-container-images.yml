# Publica imagens no GHCR em todo push na branch main.
# Nomes: ghcr.io/<dono>/<repo>/<serviço>:main e :<sha do commit>
name: Publish container images (GHCR)

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

concurrency:
  group: ghcr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  java-services:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - catalog-service
          - inventory-service
          - rental-service
          - search-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/${{ matrix.service }}:main
            ghcr.io/${{ github.repository }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web
        uses: docker/build-push-action@v6
        with:
          context: ./web
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/web:main
            ghcr.io/${{ github.repository }}/web:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_CATALOG_API_URL=http://localhost:8080
            NEXT_PUBLIC_INVENTORY_API_URL=http://localhost:8081
            NEXT_PUBLIC_RENTAL_API_URL=http://localhost:8082
            NEXT_PUBLIC_SEARCH_API_URL=http://localhost:8083
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web
