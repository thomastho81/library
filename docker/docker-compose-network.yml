# Infraestrutura e rede: PostgreSQL (catalog, inventory, rental), RabbitMQ, Elasticsearch.
# Cria a rede nomeada `library_network` usada pelo docker-compose-app.yml.
#
# Uso (na pasta docker/):
#   docker compose -f docker-compose-network.yml up -d
# Depois suba a aplicação:
#   docker compose -f docker-compose-app.yml up -d --build
#
# Linux: para Elasticsearch pode ser necessário: sudo sysctl -w vm.max_map_count=262144

services:
  postgres:
    image: postgres:16-alpine
    container_name: catalog-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: catalog_user
      POSTGRES_PASSWORD: catalog_secret
      POSTGRES_DB: catalog_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - library_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catalog_user -d catalog_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  inventory-postgres:
    image: postgres:16-alpine
    container_name: inventory-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: inventory_user
      POSTGRES_PASSWORD: inventory_secret
      POSTGRES_DB: inventory_db
    ports:
      - "5433:5432"
    volumes:
      - inventory_postgres_data:/var/lib/postgresql/data
    networks:
      - library_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inventory_user -d inventory_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  rental-postgres:
    image: postgres:16-alpine
    container_name: rental-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: rental_user
      POSTGRES_PASSWORD: rental_secret
      POSTGRES_DB: rental_db
    ports:
      - "5434:5432"
    volumes:
      - rental_postgres_data:/var/lib/postgresql/data
    networks:
      - library_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rental_user -d rental_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: library-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: library_user
      RABBITMQ_DEFAULT_PASS: library_secret
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - library_network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    container_name: library-elasticsearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - library_network
    healthcheck:
      test: ["CMD-SHELL", "curl -s -f http://localhost:9200/_cluster/health?wait_for_status=yellow || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 40s

volumes:
  postgres_data:
    name: catalog_postgres_data
  inventory_postgres_data:
    name: inventory_postgres_data
  rental_postgres_data:
    name: rental_postgres_data
  elasticsearch_data:
    name: library_elasticsearch_data

networks:
  library_network:
    name: library_network
    driver: bridge
