spring.application.name=catalog-service

# MongoDB Configuration
spring.data.mongodb.uri=mongodb://catalog_user:catalog_secret@localhost:27017/catalog_db?authSource=admin
spring.data.mongodb.auto-index-creation=true

# Propagação (topic exchange RabbitMQ via Camel)
catalog.propagation.exchange=catalog.topic

# RabbitMQ (necessário para PropagationService e BookPropagationConsumerRouteBuilder)
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=catalog_user
spring.rabbitmq.password=catalog_secret
