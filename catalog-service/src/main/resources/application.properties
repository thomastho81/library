spring.application.name=catalog-service
server.port=8080

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/catalog_db
spring.datasource.username=catalog_user
spring.datasource.password=catalog_secret
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Executa schema.sql e data.sql ao subir
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

# Propagação (topic exchange RabbitMQ via Camel)
catalog.propagation.exchange=catalog.topic

# RabbitMQ (necessário para PropagationService e BookPropagationConsumerRouteBuilder)
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=library_user
spring.rabbitmq.password=library_secret
