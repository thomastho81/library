# Docker Compose - Catalog Service (ambiente local / desenvolvimento)
# PostgreSQL + RabbitMQ (com interface web de gerenciamento).
# Uso: a partir da pasta docker/ execute: docker compose up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: catalog-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: catalog_user
      POSTGRES_PASSWORD: catalog_secret
      POSTGRES_DB: catalog_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catalog_user -d catalog_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: catalog-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: catalog_user
      RABBITMQ_DEFAULT_PASS: catalog_secret
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  postgres_data:
    name: catalog_postgres_data
