# Docker Compose - Biblioteca distribuída (ambiente local / desenvolvimento)
# Centraliza todas as imagens necessárias: PostgreSQL (catalog + inventory), RabbitMQ.
# catalog-service e inventory-service conectam ao mesmo RabbitMQ (event-driven).
# Uso: a partir da pasta docker/ execute: docker compose up -d

services:
  # PostgreSQL do catalog-service
  postgres:
    image: postgres:16-alpine
    container_name: catalog-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: catalog_user
      POSTGRES_PASSWORD: catalog_secret
      POSTGRES_DB: catalog_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catalog_user -d catalog_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # PostgreSQL do inventory-service (banco separado por serviço)
  inventory-postgres:
    image: postgres:16-alpine
    container_name: inventory-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: inventory_user
      POSTGRES_PASSWORD: inventory_secret
      POSTGRES_DB: inventory_db
    ports:
      - "5433:5432"
    volumes:
      - inventory_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inventory_user -d inventory_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # RabbitMQ compartilhado (catalog publica eventos; inventory consome)
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: library-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: library_user
      RABBITMQ_DEFAULT_PASS: library_secret
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  postgres_data:
    name: catalog_postgres_data
  inventory_postgres_data:
    name: inventory_postgres_data
